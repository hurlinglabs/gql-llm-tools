name: Publish gql-schema-scout

on:
  push:
    tags:
      - "@hurling/gql-schema-scout@*"
      - "gql-schema-scout@*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            TAG=${GITHUB_REF#refs/tags/}
            VERSION=${TAG#*@}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install npm v11
        run: npm install -g npm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Isolate package
        working-directory: packages/libaries/gql-schema-scout
        run: pnpm exec isolate

      - name: Publish @hurling/gql-schema-scout
        working-directory: packages/libaries/gql-schema-scout/isolate
        run: npm publish --access public

      - name: Prepare alias package
        working-directory: packages/libaries/gql-schema-scout/isolate
        run: npm pkg set name="gql-schema-scout"

      - name: Publish gql-schema-scout (alias)
        working-directory: packages/libaries/gql-schema-scout/isolate
        run: npm publish --access public --force
